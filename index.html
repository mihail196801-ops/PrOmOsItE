<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Первый Творческий — откуда флаер?</title>
    <meta name="description" content="Расскажите, откуда вы узнали о нашем гостевом доме. Выберите вариант и переходите далее.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            position: relative;
            background: #0a0f1a;
            overflow-x: hidden;
        }
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(125deg, #0f172a 0%, #1e293b 40%, #2d3a4e 100%);
            overflow: hidden;
        }
        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 40%, rgba(203,153,55,0.2) 0%, rgba(0,0,0,0) 60%);
            animation: pulse 12s infinite alternate;
        }
        .animated-bg::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -10%;
            width: 120%;
            height: 80%;
            background: repeating-linear-gradient(45deg, rgba(203,153,55,0.05) 0px, rgba(203,153,55,0.05) 2px, transparent 2px, transparent 8px);
            transform: rotate(-5deg);
            pointer-events: none;
        }
        @keyframes pulse {
            0% { transform: scale(1) rotate(0deg); opacity:0.3; }
            100% { transform: scale(1.2) rotate(3deg); opacity:0.7; }
        }
        .waves {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            z-index: 1;
            opacity: 0.3;
            pointer-events: none;
        }
        .waves svg {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
        }
        .container {
            position: relative;
            z-index: 10;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            backdrop-filter: blur(2px);
        }
        .hero {
            text-align: center;
            margin-bottom: 3rem;
        }
        .hero__badge {
            display: inline-block;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #e9c47e;
            margin-bottom: 1rem;
            font-weight: 500;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            padding: 0.3rem 1rem;
            border-radius: 40px;
        }
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #f5e7c8, #e9c47e, #f0dbaa);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .hero p {
            font-size: 1.2rem;
            color: #e0e7ff;
            max-width: 550px;
            margin: 0 auto;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            display: inline-block;
        }
        .cards-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2.5rem;
            margin: 3rem 0;
        }
        .choice-card {
            background: rgba(20,28,40,0.75);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 2rem 2.5rem;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: all 0.4s cubic-bezier(0.2,0.9,0.4,1.1);
            border: 1px solid rgba(233,196,126,0.3);
            flex: 1;
            min-width: 260px;
            max-width: 360px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        .choice-card:hover {
            transform: translateY(-10px);
            border-color: #e9c47e;
            box-shadow: 0 30px 45px -12px rgba(233,196,126,0.3);
            background: rgba(30,40,55,0.85);
        }
        .card-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: block;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }
        .choice-card h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #f5e7c8, #e9c47e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .choice-card p {
            color: #b9c7d9;
            font-size: 1rem;
            font-weight: 500;
        }
        .admin-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #ccd6f0;
            text-decoration: none;
            transition: all 0.2s;
            border: 1px solid rgba(233,196,126,0.3);
            font-family: 'Inter', monospace;
            letter-spacing: 0.5px;
        }
        .admin-link:hover {
            background: rgba(233,196,126,0.2);
            color: #e9c47e;
            border-color: #e9c47e;
            transform: translateY(-2px);
        }
        @media (max-width:700px) {
            .cards-grid { gap:1.5rem; }
            .choice-card { padding:1.5rem 1.8rem; }
            .choice-card h2 { font-size:1.6rem; }
            .admin-link { bottom:12px; right:12px; padding:6px 12px; font-size:0.7rem; }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    <div class="waves">
        <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
            <path fill="rgba(233,196,126,0.1)" d="M0,192L48,197.3C96,203,192,213,288,208C384,203,480,181,576,176C672,171,768,181,864,197.3C960,213,1056,235,1152,229.3C1248,224,1344,192,1392,176L1440,160L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
            <path fill="rgba(233,196,126,0.2)" d="M0,224L48,213.3C96,203,192,181,288,176C384,171,480,181,576,197.3C672,213,768,235,864,234.7C960,235,1056,213,1152,197.3C1248,181,1344,171,1392,165.3L1440,160L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
        </svg>
    </div>

    <div class="container">
        <div class="hero">
            <div class="hero__badge">✨ Вдохновение начинается здесь ✨</div>
            <h1>Откуда вы получили флаер?</h1>
            <p>поделитесь историей — вдохновляйте нас</p>
        </div>

        <div class="cards-grid">
            <div class="choice-card" data-type="flyer">
                <span class="card-icon">✨</span>
                <h2>ФЛАЕР</h2>
                <p>Если вам дал его промоутер</p>
            </div>
            <div class="choice-card" data-type="mail">
                <span class="card-icon">📬</span>
                <h2>ПОЧТА</h2>
                <p>Если вынули из почтового ящика</p>
            </div>
        </div>
    </div>

    <a href="admin/admin.html" class="admin-link">🔐 Администратор</a>

    <script>
        // ============ НАСТРОЙКИ GIST ============
        // 1. Создайте Gist с содержимым: { "flyer": 0, "mail": 0 }
        // 2. Скопируйте ID Gist (из URL: https://gist.github.com/ваш_логин/ID)
        // 3. Создайте Personal Access Token (Settings → Developer settings → Tokens) с правами "gist"
        // 4. Вставьте их ниже:
        const GIST_ID = "bddc041a5f49f18b18aee66bcba8eed4";
        const GITHUB_TOKEN = "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";
        // ========================================

        const GIST_API_URL = `https://gist.github.com/mihail196801-ops/bddc041a5f49f18b18aee66bcba8eed4`;

        async function getStats() {
            const response = await fetch(GIST_API_URL, {
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            const gist = await response.json();
            const content = gist.files['stats.json'].content;
            return JSON.parse(content);
        }

        async function updateStats(type) {
            const current = await getStats();
            current[type] = (current[type] || 0) + 1;

            const newContent = JSON.stringify(current, null, 2);
            const patch = {
                files: {
                    'stats.json': {
                        content: newContent
                    }
                }
            };
            await fetch(GIST_API_URL, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(patch)
            });
        }

        document.querySelectorAll('.choice-card').forEach(card => {
            card.addEventListener('click', async (e) => {
                e.preventDefault();
                const type = card.getAttribute('data-type');
                if (type) {
                    await updateStats(type);
                    window.location.href = 'main.html';
                }
            });
        });
    </script>
</body>
</html>
