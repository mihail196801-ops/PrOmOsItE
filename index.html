<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Выберите источник флаера | Первый Творческий</title>
  <meta name="description" content="Вам предоставлена скидка 12%. Выберите, откуда вы получили флаер: от промоутера или по почте.">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Скидочная лента — сверху, фиксировано -->
  <div class="discount-banner" aria-live="polite">
    <span class="discount-text">Вам предоставлена скидка</span>
    <span class="discount-value">12%</span>
  </div>

  <main class="main-layout">
    <h1 class="main-title" aria-label="Заголовок: выберите откуда вы получили флаер?">
      ВЫБЕРИТЕ ОТКУДА ВЫ ПОЛУЧИЛИ ФЛАЕР?
    </h1>

    <!-- Композиция: столб + флаер + стрелки -->
    <div class="signpost-composition">
      <img src="images/stolb.png" alt="Деревянный указательный столб" class="signpost-pole" />

      <img src="images/000.png" alt="Флаер с предложением" class="signpost-flyer" />

      <a href="main.html"
         class="signpost-arrow signpost-arrow--top"
         aria-label="Выбрать: от промоутера">
        <span class="signpost-arrow__text">От промоутера</span>
      </a>

      <a href="main.html"
         class="signpost-arrow signpost-arrow--bottom"
         aria-label="Выбрать: по почте">
        <span class="signpost-arrow__text">По почте</span>
      </a>
    </div>
  </main>

  <!-- Для 404 — серверная настройка не требуется, но можно добавить meta -->
  <script>
    // Опционально: автоматический редирект при ошибке (если нет .htaccess)
    // document.addEventListener('DOMContentLoaded', () => {
    //   if (window.location.pathname === '/404') window.location.href = '/';
    // });
  </script>
</body>
</html>
