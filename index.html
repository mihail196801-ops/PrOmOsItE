<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Первый Творческий — откуда флаер?</title>
    <meta name="description" content="Расскажите, откуда вы узнали о нашем гостевом доме. Выберите вариант и переходите к вдохновляющему контенту.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #ffffff;
            --text-dark: #1a2a3a;
            --text-soft: #2c3e50;
            --accent: #b8860b;
            --accent-light: #faf0e6;
            --shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-dark);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1280px;
            width: 100%;
            margin: 0 auto;
        }

        /* Hero секция */
        .hero {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .hero__badge {
            display: inline-block;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 7vw, 4rem);
            font-weight: 600;
            color: #1e2f3f;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #1e2f3f, #b8860b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: #5b6e7c;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Карточки с иконками */
        .cards-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            margin: 3rem 0;
        }

        .choice-card {
            background: #ffffff;
            border-radius: 2rem;
            padding: 2rem 2rem 2rem;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
            box-shadow: var(--shadow);
            border: 1px solid rgba(184, 134, 11, 0.15);
            flex: 1;
            min-width: 240px;
            max-width: 320px;
        }

        .choice-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 45px -12px rgba(0, 0, 0, 0.15);
            border-color: var(--accent);
        }

        .card-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            display: block;
        }

        .choice-card h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #3c2e22, #a57c2c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .choice-card p {
            color: #7b6b54;
            font-size: 0.95rem;
        }

        /* Иллюстрации (промоутер и ящик) */
        .illustrations {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-top: 2rem;
            opacity: 0.9;
        }

        .illustrations img {
            max-width: 140px;
            height: auto;
            filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.05));
            transition: transform 0.2s;
        }

        .illustrations img:hover {
            transform: translateY(-3px);
        }

        @media (max-width: 700px) {
            .cards-grid {
                gap: 1.5rem;
            }
            .illustrations img {
                max-width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <div class="hero__badge">✨ Вдохновение начинается здесь ✨</div>
            <h1>Откуда вы получили флаер?</h1>
            <p>поделитесь историей — вдохновляйте нас</p>
        </div>

        <div class="cards-grid">
            <a href="main.html" class="choice-card">
                <span class="card-icon">✨</span>
                <h2>ФЛАЕР</h2>
                <p>получи вдохновение</p>
            </a>
            <a href="main.html" class="choice-card">
                <span class="card-icon">📬</span>
                <h2>ПОЧТА</h2>
                <p>отправить привет</p>
            </a>
        </div>

        <div class="illustrations">
            <img src="images/promouter.jpg" alt="Промоутер" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20200%20200%22%3E%3Crect%20width%3D%22200%22%20height%3D%22200%22%20fill%3D%22%23f5ede2%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%20fill%3D%22%239b7b4a%22%3Epromouter%3C%2Ftext%3E%3C%2Fsvg%3E'">
            <img src="images/yazhik.jpg" alt="Почтовый ящик" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20200%20200%22%3E%3Crect%20width%3D%22200%22%20height%3D%22200%22%20fill%3D%22%23fff0e0%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%20fill%3D%22%23bc5a48%22%3E📬%3C%2Ftext%3E%3C%2Fsvg%3E'">
        </div>
    </div>
</body>
</html>
