<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Выбор источника</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Скидка 12% — фиксированная лента сверху -->
  <div class="discount-banner">
    Вам предоставлена скидка <span class="highlight">12%</span>
  </div>

  <div class="container">
    <h1 class="title">ВЫБЕРИТЕ ОТКУДА ВЫ ПОЛУЧИЛИ ФЛАЕР?</h1>

    <div class="pole-composition">
      <!-- Столб слева -->
      <img src="images/stolb.png" alt="Деревянный столб" class="pole" />

      <!-- Флаер 000 справа от столба -->
      <img src="images/000.png" alt="Флаер" class="flyer" />

      <!-- Стрелки поверх -->
      <a href="main.html" class="arrow-wrapper top">
        <div class="arrow-img">
          <div class="arrow-text">От промоутера</div>
        </div>
      </a>

      <a href="main.html" class="arrow-wrapper bottom">
        <div class="arrow-img">
          <div class="arrow-text">По почте</div>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
