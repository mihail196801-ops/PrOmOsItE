<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Панель администратора — Первый Творческий</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0f1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .admin-panel {
            background: rgba(20,28,40,0.9);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(233,196,126,0.3);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            text-align: center;
            color: #e9c47e;
        }
        .input-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #ccd6f0;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 0.8rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(233,196,126,0.3);
            border-radius: 1rem;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        input:focus {
            border-color: #e9c47e;
        }
        button {
            background: linear-gradient(105deg, #e9c47e, #c9a03d);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: all 0.2s;
            color: #1a2a3a;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(233,196,126,0.3);
        }
        .stats {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(233,196,126,0.3);
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 1.2rem;
        }
        .stat-label {
            color: #e9c47e;
            font-weight: 600;
        }
        .stat-value {
            color: white;
            font-weight: 700;
            font-size: 1.4rem;
        }
        .reset-btn {
            background: rgba(220,80,60,0.8);
            margin-top: 1rem;
            color: white;
        }
        .reset-btn:hover {
            background: #dc503c;
        }
        .error {
            color: #ff9e7a;
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="admin-panel">
        <h1>🔐 Панель администратора</h1>
        <div id="loginForm">
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="passwordInput" placeholder="Введите пароль">
            </div>
            <button id="loginBtn">Войти</button>
            <div id="loginError" class="error hidden"></div>
        </div>

        <div id="statsPanel" class="hidden">
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">✨ ФЛАЕР (промоутер)</span>
                    <span class="stat-value" id="flyerCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">📬 ПОЧТА (ящик)</span>
                    <span class="stat-value" id="mailCount">0</span>
                </div>
            </div>
            <button id="resetStatsBtn" class="reset-btn">Сбросить статистику</button>
            <button id="logoutBtn" style="margin-top:0.8rem; background:#2d3748;">Выйти</button>
        </div>
    </div>

    <script>
        // Те же настройки Gist, что и в index.html
        const GIST_ID = "ВАШ_GIST_ID";
        const GITHUB_TOKEN = "ВАШ_PERSONAL_ACCESS_TOKEN";
        const ADMIN_PASSWORD = "2011";

        const GIST_API_URL = `https://api.github.com/gists/${GIST_ID}`;

        async function getStats() {
            const response = await fetch(GIST_API_URL, {
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            const gist = await response.json();
            const content = gist.files['stats.json'].content;
            return JSON.parse(content);
        }

        async function setStats(newStats) {
            const patch = {
                files: {
                    'stats.json': {
                        content: JSON.stringify(newStats, null, 2)
                    }
                }
            };
            await fetch(GIST_API_URL, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(patch)
            });
        }

        let isAuthenticated = false;

        const loginForm = document.getElementById('loginForm');
        const statsPanel = document.getElementById('statsPanel');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const flyerSpan = document.getElementById('flyerCount');
        const mailSpan = document.getElementById('mailCount');
        const resetStatsBtn = document.getElementById('resetStatsBtn');
        const logoutBtn = document.getElementById('logoutBtn');

        async function updateUI() {
            const stats = await getStats();
            flyerSpan.textContent = stats.flyer || 0;
            mailSpan.textContent = stats.mail || 0;
        }

        async function resetStats() {
            if (confirm('Вы уверены, что хотите сбросить статистику? Это действие необратимо.')) {
                await setStats({ flyer: 0, mail: 0 });
                await updateUI();
                alert('Статистика сброшена.');
            }
        }

        function logout() {
            isAuthenticated = false;
            loginForm.classList.remove('hidden');
            statsPanel.classList.add('hidden');
            passwordInput.value = '';
            loginError.classList.add('hidden');
        }

        loginBtn.addEventListener('click', async () => {
            const pass = passwordInput.value;
            if (pass === ADMIN_PASSWORD) {
                isAuthenticated = true;
                loginForm.classList.add('hidden');
                statsPanel.classList.remove('hidden');
                await updateUI();
            } else {
                loginError.textContent = 'Неверный пароль. Попробуйте ещё раз.';
                loginError.classList.remove('hidden');
            }
        });

        resetStatsBtn.addEventListener('click', resetStats);
        logoutBtn.addEventListener('click', logout);
    </script>
</body>
</html>
